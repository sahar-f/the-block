<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Block — Vehicle Auctions</title>
		<script>
			(() => {
				let t;
				try {
					t = localStorage.theme;
					if (t === "dark" || (!t && window.matchMedia && matchMedia("(prefers-color-scheme:dark)").matches)) {
						document.documentElement.classList.add("dark");
					}
				} catch (_e) { /* no-op */ }
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@600&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body class="bg-page text-text-primary antialiased">
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
